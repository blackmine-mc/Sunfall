general {
    # There are 2 modes supported:
    # 0 - Allow chiseling of the Ztones Tile into each of the different types Ztones adds.
    # 1 - Allow chiseling between all the variants within their type. [range: 0 ~ 1, default: 1]
    I:chiselCarvingMode=1

    # Should Chisel recipes for carving of Ztone variants be registered? [default: true]
    B:enableChiselIntegration=true

    # Can mobs spawn on decorative blocks? [default: false]
    B:enableCreatureSpawnOnZtones=false

    # Can Ztone variants be crafted using Ofanix? [default: true]
    B:enableVariantCrafting=true

    # Is Ztone variants scroll-cycling enabled? [default: true]
    B:enableVariantCycling=true
}


